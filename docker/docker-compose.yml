services:
  janus:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../conf/environments/local.env.example
    environment:
      PYTHONPATH: /workspace/src
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      JANUS_CA_BUNDLE: /workspace/conf/certs/rnpicpedugr46ovtlsca2025.pem
    user: "${JANUS_CONTAINER_USER:-1000:1000}"
    stdin_open: true
    tty: true
    volumes:
      - ${JANUS_PROJECT_ROOT:-..}/src:/workspace/src:ro,z
      - ${JANUS_PROJECT_ROOT:-..}/tests:/workspace/tests:ro,z
      - ${JANUS_PROJECT_ROOT:-..}/conf:/workspace/conf:ro,z
      - ${JANUS_PROJECT_ROOT:-..}/data:/workspace/data:z
      - ${JANUS_PROJECT_ROOT:-..}/pyproject.toml:/workspace/pyproject.toml:ro,z
    working_dir: /workspace
    command: ["sh", "-lc", "trap 'exit 0' TERM INT; while :; do sleep 3600; done"]
