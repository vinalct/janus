sources:
  - source_id: transparencia__orgaos__siape__full_refresh
    name: Portal da Transparencia - Órgãos do SIAPE
    description: 
    owner: janus
    enabled: false
    source_type: api
    strategy: api
    strategy_variant: page_number_api
    federation_level: federal
    domain: transparencia
    public_access: true
    tags:
      - transparencia
      - federal
      - api
      - servidores

    access:
      base_url: https://api.portaldatransparencia.gov.br
      path: /api-de-dados/orgaos-siape
      method: GET
      format: json
      timeout_seconds: 60
      headers:
        Accept: application/json
      auth:
        type: header_token
        env_var: TRANSPARENCIA_API_TOKEN
        header_name: chave-api-dados
      pagination:
        type: page_number
        page_param: pagina
        size_param: tamanhoPagina
        page_size: 15
      rate_limit:
        requests_per_minute: 90
        concurrency: 10
        backoff_seconds: 10

    extraction:
      mode: full_refresh
      checkpoint_strategy: none
      dead_letter_max_items: 100
      retry:
        max_attempts: 4
        backoff_strategy: exponential
        backoff_seconds: 5

    schema:
      mode: infer
      
    spark:
      input_format: json
      write_mode: overwrite
      repartition: 1
      partition_by:
        - ingestion_date

    outputs:
      raw:
        path: data/raw/transparencia/orgaos__siape
        format: json
      bronze:
        path: data/bronze/transparencia/orgaos__siape
        format: iceberg
        namespace: bronze__transparencia
        table_name: orgaos__siape
      metadata:
        path: data/metadata/transparencia/orgaos__siape
        format: json

    quality:
      required_fields:
        - qntPessoas
        - qntVinculos
        - codOrgaoExercicioSiape
      allow_schema_evolution: true

