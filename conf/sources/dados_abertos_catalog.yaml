source_id: dados_abertos_catalog
name: Portal Brasileiro de Dados Abertos - Catalogo de conjuntos de dados
description: Metadata catalog ingestion for federal open datasets listed by dados.gov.br.
owner: janus
enabled: false
source_type: catalog
strategy: catalog
strategy_variant: metadata_catalog
federation_level: federal
domain: dados_abertos
public_access: true
tags:
  - dados-gov-br
  - catalog
  - metadata
  - federal

access:
  base_url: https://dados.gov.br
  path: /dados/api/publico/conjuntos-dados
  method: GET
  format: json
  timeout_seconds: 60
  headers:
    Accept: application/json
  params:
    dadosAbertos: "true"
    isPrivado: "false"
  auth:
    type: header_token
    env_var: DADOS_GOV_BR_API_TOKEN
    header_name: chave-api-dados-abertos
  pagination:
    type: page_number
    page_param: pagina
    size_param: tamanhoPagina
    page_size: 15
  rate_limit:
    requests_per_minute: 30
    concurrency: 1
    backoff_seconds: 10

extraction:
  mode: snapshot
  checkpoint_strategy: none
  retry:
    max_attempts: 4
    backoff_strategy: exponential
    backoff_seconds: 2

schema:
  mode: explicit
  path: conf/schemas/dados_abertos_catalog/catalog_metadata_schema.json

spark:
  input_format: jsonl
  write_mode: overwrite
  repartition: 1
  partition_by:
    - ingestion_date
    - entity_type

outputs:
  raw:
    path: data/raw/dados_abertos/catalog
    format: json
  bronze:
    path: data/bronze/dados_abertos/catalog
    format: parquet
  metadata:
    path: data/metadata/dados_abertos/catalog
    format: json

quality:
  required_fields:
    - entity_type
    - entity_key
    - catalog_request_url
    - catalog_raw_artifact_path
  allow_schema_evolution: true
