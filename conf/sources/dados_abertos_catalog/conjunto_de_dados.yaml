sources:
  - source_id: dados_abertos_catalog__conjunto_dados__full_refresh
    name: Portal Brasileiro de Dados Abertos - Catalogo de conjuntos de dados
    description: Metadata catalog ingestion for federal open datasets listed by dados.gov.br.
    owner: janus
    enabled: false
    source_type: catalog
    strategy: catalog
    strategy_variant: metadata_catalog
    federation_level: federal
    domain: dados_abertos
    public_access: true
    tags:
      - dados-gov-br
      - catalog
      - metadata
      - federal

    access:
      base_url: https://dados.gov.br
      path: /dados/api/publico/conjuntos-dados
      method: GET
      format: json
      timeout_seconds: 60
      headers:
        Accept: application/json
      params:
        dadosAbertos: "true"
        isPrivado: "false"
      auth:
        type: header_token
        env_var: DADOS_GOV_BR_API_TOKEN
        header_name: chave-api-dados-abertos
      pagination:
        type: page_number
        page_param: pagina
        size_param: tamanhoPagina
        page_size: 15
      rate_limit:
        requests_per_minute: 90
        concurrency: 5
        backoff_seconds: 10

    extraction:
      mode: full_refresh
      checkpoint_strategy: none
      dead_letter_max_items: 10
      retry:
        max_attempts: 4
        backoff_strategy: exponential
        backoff_seconds: 5

    schema:
      mode: explicit
      path: conf/schemas/dados_abertos_catalog/catalog_metadata_schema.json

    spark:
      input_format: jsonl
      write_mode: overwrite
      repartition: 1
      partition_by:
        - ingestion_date
        - entity_type

    outputs:
      raw:
        path: data/raw/dados_abertos/catalog
        format: json
      bronze:
        path: data/bronze/dados_abertos/catalog
        format: iceberg
        namespace: bronze__dados_abertos_catalog
        table_name: conjuntos_dados
      metadata:
        path: data/metadata/dados_abertos/catalog
        format: json

    quality:
      required_fields:
        - entity_type
        - entity_key
        - catalog_request_url
        - catalog_raw_artifact_path
      allow_schema_evolution: true

  - source_id: dados_abertos_catalog__conjunto_dados_details__full_refresh
    name: Portal Brasileiro de Dados Abertos - Catalogo de conjuntos de dados
    description: Detalha um conjunto de dados
    owner: janus
    enabled: false
    source_type: catalog
    strategy: catalog
    strategy_variant: metadata_catalog
    federation_level: federal
    domain: dados_abertos
    public_access: true
    tags:
      - dados-gov-br
      - catalog
      - metadata
      - federal

    access:
      base_url: https://dados.gov.br
      path: /dados/api/publico/conjuntos-dados/{id}
      method: GET
      format: json
      timeout_seconds: 60
      headers:
        Accept: application/json
      request_inputs:
        type: iceberg_rows
        namespace: bronze__dados_abertos_catalog
        table_name: conjuntos_dados
        columns:
          id: catalog_payload.id
        distinct: true
      parameter_bindings:
        id:
          from: request_input.id
      params:
        dadosAbertos: "true"
        isPrivado: "false"
      auth:
        type: header_token
        env_var: DADOS_GOV_BR_API_TOKEN
        header_name: chave-api-dados-abertos
      pagination:
        type: page_number
        page_param: pagina
        size_param: tamanhoPagina
        page_size: 15
      rate_limit:
        requests_per_minute: 90
        concurrency: 5
        backoff_seconds: 10

    extraction:
      mode: full_refresh
      checkpoint_strategy: none
      dead_letter_max_items: 1000
      retry:
        max_attempts: 4
        backoff_strategy: exponential
        backoff_seconds: 5

    schema:
      mode: explicit
      path: conf/schemas/dados_abertos_catalog/catalog_metadata_schema.json

    spark:
      input_format: jsonl
      write_mode: overwrite
      repartition: 1
      partition_by:
        - ingestion_date
        - entity_type

    outputs:
      raw:
        path: data/raw/dados_abertos/catalog/conjunto_dados_details
        format: json
      bronze:
        path: data/bronze/dados_abertos/catalog/conjunto_dados_details
        format: iceberg
        namespace: bronze__dados_abertos_catalog
        table_name: conjuntos_dados_details
      metadata:
        path: data/metadata/dados_abertos/catalog/conjunto_dados_details
        format: json

    quality:
      required_fields:
        - entity_type
        - entity_key
        - catalog_request_url
        - catalog_raw_artifact_path
      allow_schema_evolution: true
