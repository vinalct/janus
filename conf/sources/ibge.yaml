source_id: ibge_pib_brasil
name: IBGE - PIB nacional a precos correntes
description: National GDP current-price series from IBGE SIDRA aggregate 5938 through the public IBGE Aggregates API.
owner: janus
enabled: false
source_type: api
strategy: api
strategy_variant: date_window_api
source_hook: ibge.sidra_flat
federation_level: federal
domain: estatisticas
public_access: true
tags:
  - ibge
  - sidra
  - pib
  - api
  - federal

access:
  base_url: https://servicodados.ibge.gov.br
  path: /api/v3/agregados/5938/periodos/2023/variaveis/37
  method: GET
  format: json
  timeout_seconds: 60
  headers:
    Accept: application/json
  params:
    localidades: "N1[all]"
    view: flat
  auth:
    type: none
  pagination:
    type: none
  rate_limit:
    requests_per_minute: 30
    concurrency: 1
    backoff_seconds: 10

extraction:
  mode: incremental
  checkpoint_field: sidra_period_code
  checkpoint_strategy: max_value
  retry:
    max_attempts: 4
    backoff_strategy: exponential
    backoff_seconds: 2

schema:
  mode: infer

spark:
  input_format: jsonl
  write_mode: overwrite
  repartition: 1
  partition_by:
    - ingestion_date

outputs:
  raw:
    path: data/raw/ibge/pib_brasil
    format: json
  bronze:
    path: data/bronze/ibge/pib_brasil
    format: parquet
  metadata:
    path: data/metadata/ibge/pib_brasil
    format: json

quality:
  required_fields:
    - aggregate_id
    - value
    - sidra_dimension_count
    - sidra_attribute_count
  allow_schema_evolution: true
