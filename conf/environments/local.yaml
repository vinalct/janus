name: local

runtime:
  log_level: ${JANUS_LOG_LEVEL:-INFO}

spark:
  app_name: ${JANUS_SPARK_APP_NAME:-janus-local}
  master: ${JANUS_SPARK_MASTER:-local[*]}
  warehouse_dir: ${JANUS_SPARK_WAREHOUSE_DIR:-data/metadata/spark-warehouse}
  ivy_dir: ${JANUS_SPARK_IVY_DIR:-data/metadata/ivy}
  iceberg:
    catalog_name: ${JANUS_ICEBERG_CATALOG_NAME:-janus}
    warehouse_dir: ${JANUS_ICEBERG_WAREHOUSE_DIR:-data/metadata/iceberg}
    runtime_package: ${JANUS_ICEBERG_RUNTIME_PACKAGE:-org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1}
    default_namespace: ${JANUS_ICEBERG_DEFAULT_NAMESPACE:-bronze}
  config:
    spark.driver.bindAddress: 127.0.0.1
    spark.sql.session.timeZone: UTC
    spark.sql.shuffle.partitions: "4"
    spark.ui.enabled: "false"

storage:
  root_dir: ${JANUS_DATA_ROOT:-data}
  raw_dir: ${JANUS_RAW_DIR:-data/raw}
  bronze_dir: ${JANUS_BRONZE_DIR:-data/bronze}
  metadata_dir: ${JANUS_METADATA_DIR:-data/metadata}
